name: Build Windows App (Test)

# Builds on every push — for YOU to test. Does NOT publish to customers.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Windows installer (no publish)
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer for testing
        uses: actions/upload-artifact@v4
        with:
          name: BookkeepingAI-Windows-Test
          path: release/*.exe
          retention-days: 30
